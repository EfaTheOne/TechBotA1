<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Python from GitHub</title>
    <!-- Link to PyScript assets -->
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>
    <h1>Running Python from GitHub File</h1>
    <p>Output from the Python script:</p>
    <!-- Use the <script> tag with a src attribute pointing to the raw GitHub URL -->
    <script type="py" src="YOUR_GITHUB_RAW_URL_HERE"></script>
</body>
</html>
